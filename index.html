<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베베피디아 — 육아용품 평점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3e;
    --accent: #ff6b6b;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --text: #f0f0f5;
    --text-muted: #7a7a99;
    --text-dim: #4a4a66;
    --star-filled: #ffd166;
    --star-empty: #2e2e3e;
    --radius: 16px;
    --card-w: 200px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG texture ── */
  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(255,107,107,.08), transparent),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(255,209,102,.06), transparent);
  }

  /* ── HEADER ── */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(15,15,19,.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap:24px;
    height: 64px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }

  .search-wrap {
    flex:1; max-width:420px; position:relative;
  }
  .search-wrap input {
    width:100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 20px 8px 42px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color: var(--text-dim);
  }

  .header-nav { margin-left:auto; display:flex; gap:8px; }
  .btn-ghost {
    background:none; border:1px solid var(--border);
    color: var(--text-muted); padding:7px 16px;
    border-radius:100px; font-family:inherit; font-size:13px;
    cursor:pointer; transition: all .2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-fill {
    background: var(--accent); border:none;
    color: #fff; padding:7px 18px;
    border-radius:100px; font-family:inherit; font-size:13px; font-weight:700;
    cursor:pointer; transition: opacity .2s;
  }
  .btn-fill:hover { opacity:.85; }

  /* ── HERO ── */
  .hero {
    padding: 56px 32px 32px;
    position:relative; z-index:1;
  }
  .hero-eyebrow {
    font-size:12px; font-weight:700; letter-spacing:3px;
    color: var(--accent); text-transform:uppercase; margin-bottom:10px;
  }
  .hero-title {
    font-size: clamp(28px, 4vw, 48px);
    font-weight:900; line-height:1.15;
    letter-spacing:-1.5px;
    margin-bottom:12px;
  }
  .hero-title em { color: var(--accent2); font-style:normal; }
  .hero-sub { font-size:15px; color: var(--text-muted); max-width:500px; }

  /* ── FILTER TABS ── */
  .tabs-wrap {
    padding: 20px 32px 0;
    display:flex; gap:8px; flex-wrap:wrap;
    position:relative; z-index:1;
  }
  .tab {
    background: var(--surface); border:1px solid var(--border);
    color: var(--text-muted); padding:6px 16px;
    border-radius:100px; font-family:inherit; font-size:13px;
    cursor:pointer; transition: all .2s; white-space:nowrap;
  }
  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active {
    background: var(--accent2); border-color: var(--accent2);
    color: #111; font-weight:700;
  }

  /* ── SORT BAR ── */
  .sort-bar {
    padding: 20px 32px 12px;
    display:flex; align-items:center; gap:16px;
    position:relative; z-index:1;
  }
  .sort-label { font-size:13px; color: var(--text-dim); }
  .sort-btn {
    background:none; border:none; font-family:inherit;
    font-size:13px; color: var(--text-muted); cursor:pointer;
    padding: 4px 8px; border-radius:6px; transition: all .2s;
  }
  .sort-btn.active { color: var(--text); font-weight:700; }
  .sort-btn:hover { color: var(--text); }
  .item-count { margin-left:auto; font-size:13px; color: var(--text-dim); }

  /* ── GRID ── */
  .grid {
    padding: 8px 32px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
    gap: 20px;
    position:relative; z-index:1;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
    animation: fadeUp .4s both;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
    border-color: rgba(255,107,107,.3);
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card:nth-child(1)  { animation-delay:.03s }
  .card:nth-child(2)  { animation-delay:.06s }
  .card:nth-child(3)  { animation-delay:.09s }
  .card:nth-child(4)  { animation-delay:.12s }
  .card:nth-child(5)  { animation-delay:.15s }
  .card:nth-child(6)  { animation-delay:.18s }
  .card:nth-child(7)  { animation-delay:.21s }
  .card:nth-child(8)  { animation-delay:.24s }
  .card:nth-child(9)  { animation-delay:.27s }
  .card:nth-child(10) { animation-delay:.30s }

  .card-img {
    width:100%; aspect-ratio:1/1;
    object-fit:cover;
    display:block;
    background: var(--surface2);
    position: relative;
  }
  .card-img-wrap { position:relative; overflow:hidden; }
  .card-img-wrap img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; transition: transform .4s; }
  .card:hover .card-img-wrap img { transform:scale(1.06); }

  .card-badge {
    position:absolute; top:10px; left:10px;
    background: var(--accent); color:#fff;
    font-size:10px; font-weight:700; letter-spacing:.5px;
    padding: 3px 8px; border-radius:100px;
  }
  .card-badge.new  { background: var(--accent3); color: #0a3326; }
  .card-badge.best { background: var(--accent);  color: #fff; }
  .card-badge.pick { background: var(--accent2); color: #3a2a00; }

  .card-my-rating {
    position:absolute; top:10px; right:10px;
    background: rgba(15,15,19,.85); backdrop-filter:blur(8px);
    border-radius:8px; padding:4px 8px;
    font-size:12px; font-weight:700; color: var(--accent2);
    display:flex; align-items:center; gap:3px;
  }
  .card-my-rating svg { width:11px; height:11px; fill: var(--accent2); }

  .card-body { padding: 14px 14px 16px; }
  .card-category {
    font-size:10px; font-weight:700; letter-spacing:1.5px;
    color: var(--text-dim); text-transform:uppercase; margin-bottom:5px;
  }
  .card-name {
    font-size:14px; font-weight:700; line-height:1.35;
    margin-bottom:3px; color: var(--text);
  }
  .card-brand { font-size:12px; color: var(--text-muted); margin-bottom:10px; }

  /* Star row */
  .stars-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .stars { display:flex; gap:2px; }
  .star {
    width:14px; height:14px;
    display:inline-block;
    position:relative;
    cursor: pointer;
  }
  .star svg { width:14px; height:14px; }
  .star-avg { font-size:13px; font-weight:700; color: var(--accent2); }
  .star-count { font-size:11px; color: var(--text-dim); }

  /* My rating prompt */
  .my-rate-row {
    display:flex; align-items:center; gap:6px;
    border-top: 1px solid var(--border);
    padding-top:10px; margin-top:4px;
  }
  .my-rate-label { font-size:11px; color: var(--text-dim); }
  .my-stars { display:flex; gap:2px; }
  .my-star {
    width:18px; height:18px; cursor:pointer;
    transition: transform .15s;
  }
  .my-star:hover { transform: scale(1.25); }
  .my-star svg { width:18px; height:18px; }

  /* ── MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; z-index:200;
    background: rgba(0,0,0,.7); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    opacity:0; pointer-events:none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }

  .modal {
    background: var(--surface);
    border:1px solid var(--border);
    border-radius: 20px;
    width:100%; max-width:540px;
    max-height: 88vh; overflow-y:auto;
    transform: translateY(24px) scale(.97);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    position:relative;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-close {
    position:sticky; top:0; float:right;
    background: var(--surface2); border:none;
    color: var(--text-muted); width:36px; height:36px;
    border-radius:50%; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    margin: 16px 16px 0 0; z-index:10;
    transition: color .2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-hero { display:flex; gap:20px; padding:20px 24px 0; }
  .modal-img {
    width:120px; height:120px; object-fit:cover;
    border-radius:12px; flex-shrink:0;
    background: var(--surface2);
  }
  .modal-info { flex:1; }
  .modal-cat { font-size:11px; font-weight:700; letter-spacing:1.5px; color: var(--accent); text-transform:uppercase; margin-bottom:6px; }
  .modal-name { font-size:20px; font-weight:900; line-height:1.2; margin-bottom:4px; }
  .modal-brand { font-size:13px; color: var(--text-muted); margin-bottom:12px; }

  .modal-score-block {
    display:flex; align-items:baseline; gap:8px; margin-bottom:8px;
  }
  .modal-score-big { font-size:40px; font-weight:900; color: var(--accent2); line-height:1; }
  .modal-score-denom { font-size:16px; color: var(--text-dim); }
  .modal-stars-lg { display:flex; gap:3px; }
  .modal-stars-lg svg { width:18px; height:18px; }

  .modal-body { padding: 20px 24px 28px; }
  .modal-desc { font-size:14px; color: var(--text-muted); line-height:1.7; margin-bottom:20px; }

  .modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
  .tag {
    background: var(--surface2); border:1px solid var(--border);
    color: var(--text-muted); font-size:12px;
    padding:4px 10px; border-radius:100px;
  }

  .modal-rate-section { margin-bottom:24px; }
  .modal-rate-title { font-size:13px; font-weight:700; margin-bottom:10px; }
  .modal-rate-stars { display:flex; gap:6px; }
  .modal-rate-star {
    width:32px; height:32px; cursor:pointer;
    transition: transform .15s;
  }
  .modal-rate-star:hover, .modal-rate-star.hovered { transform: scale(1.3); }
  .modal-rate-star svg { width:32px; height:32px; }
  .rate-hint { font-size:12px; color: var(--accent2); margin-top:6px; height:16px; }

  .modal-reviews { }
  .review-title { font-size:13px; font-weight:700; margin-bottom:12px; }
  .review-item {
    background: var(--surface2); border-radius:12px;
    padding: 14px; margin-bottom:10px;
  }
  .review-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .review-avatar {
    width:28px; height:28px; border-radius:50%;
    background: var(--border); display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color: var(--text-muted);
  }
  .review-user { font-size:13px; font-weight:700; }
  .review-date { font-size:11px; color: var(--text-dim); margin-left:auto; }
  .review-stars { display:flex; gap:2px; margin-bottom:6px; }
  .review-stars svg { width:12px; height:12px; }
  .review-text { font-size:13px; color: var(--text-muted); line-height:1.6; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px);
    background: var(--surface2); border:1px solid var(--border);
    border-radius:100px; padding:10px 22px;
    font-size:13px; color: var(--text);
    opacity:0; pointer-events:none; transition: all .3s;
    z-index:999; white-space:nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast strong { color: var(--accent2); }

  /* ── RESPONSIVE ── */
  @media(max-width:600px){
    header { padding:0 16px; }
    .hero, .tabs-wrap, .sort-bar, .grid { padding-left:16px; padding-right:16px; }
    .hero { padding-top:36px; }
    :root { --card-w: 150px; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>

/* ──────────────────────────────────────────
   STATE
────────────────────────────────────────── */
let currentCat = '전체';
let currentSort = 'rating';
let searchQuery = '';
let myRatings = {};   // id → score
let openProductId = null;

const RATING_LABELS = ['','별로예요','그저 그래요','보통이에요','좋아요!','최고예요!'];

/* ──────────────────────────────────────────
   HELPERS
────────────────────────────────────────── */
function starSVG(filled, size=14){
  const c = filled ? '#ffd166' : '#2e2e3e';
  return `<svg viewBox="0 0 24 24" fill="${c}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
}

function renderStars(avg, size=14){
  let html='';
  for(let i=1;i<=5;i++){
    const filled = i<=Math.round(avg);
    html+=`<span class="star">${starSVG(filled,size)}</span>`;
  }
  return html;
}

function renderMyStars(productId, currentScore, size=18, context='card'){
  let html='';
  for(let i=1;i<=5;i++){
    const filled = i<=(myRatings[productId]||0);
    html+=`<span class="my-star"
      data-id="${productId}" data-score="${i}" data-ctx="${context}"
      onmouseenter="hoverStar(this,${i},'${context}_${productId}')"
      onmouseleave="unhoverStar('${context}_${productId}',${myRatings[productId]||0})"
      onclick="rateStar(${productId},${i})"
    >${starSVG(filled,size)}</span>`;
  }
  return html;
}

function hoverStar(el, score, groupId){
  document.querySelectorAll(`[data-ctx="${el.dataset.ctx}"]`).forEach(s=>{
    const si = parseInt(s.dataset.score);
    s.innerHTML = starSVG(si<=score);
  });
  // hint for modal
  const hint = document.getElementById('rateHint');
  if(hint) hint.textContent = RATING_LABELS[score];
}

function unhoverStar(groupId, savedScore){
  // groupId = ctx_id
  const [ctx, id] = groupId.split('_');
  document.querySelectorAll(`[data-ctx="${ctx}"][data-id="${id}"]`).forEach(s=>{
    s.innerHTML = starSVG(parseInt(s.dataset.score)<=savedScore);
  });
  const hint = document.getElementById('rateHint');
  if(hint) hint.textContent = savedScore ? RATING_LABELS[savedScore] : '';
}

function rateStar(productId, score){
  myRatings[productId] = score;
  showToast(`<strong>${RATING_LABELS[score]}</strong> — 평점이 저장되었어요 ⭐`);
  renderGrid();
  // re-render modal if open
  if(openProductId === productId) openModal(productId);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'),2400);
}

/* ──────────────────────────────────────────
   FILTER & SORT
────────────────────────────────────────── */
function filteredProducts(){
  let list = PRODUCTS.filter(p=>{
    const matchCat = currentCat==='전체' || p.cat===currentCat;
    const matchSearch = !searchQuery ||
      p.name.includes(searchQuery) || p.brand.includes(searchQuery) || p.cat.includes(searchQuery);
    return matchCat && matchSearch;
  });
  if(currentSort==='rating')  list.sort((a,b)=>b.avgRating-a.avgRating);
  if(currentSort==='reviews') list.sort((a,b)=>b.reviewCount-a.reviewCount);
  if(currentSort==='newest')  list.sort((a,b)=>b.id-a.id);
  return list;
}

/* ──────────────────────────────────────────
   RENDER GRID
────────────────────────────────────────── */
function renderGrid(){
  const list = filteredProducts();
  const grid = document.getElementById('grid');
  document.getElementById('itemCount').textContent = `총 ${list.length}개`;

  grid.innerHTML = list.map((p,i)=>{
    const myScore = myRatings[p.id]||0;
    const badgeHtml = p.badge
      ? `<span class="card-badge ${p.badge}">${p.badge==='best'?'BEST':p.badge==='new'?'NEW':'PICK'}</span>`
      : '';
    const myBadge = myScore
      ? `<span class="card-my-rating">${starSVG(true,11)}&nbsp;${myScore}</span>`
      : '';
    return `
    <div class="card" style="animation-delay:${i*0.04}s" onclick="openModal(${p.id})">
      <div class="card-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        ${badgeHtml}${myBadge}
      </div>
      <div class="card-body">
        <div class="card-category">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-brand">${p.brand}</div>
        <div class="stars-row">
          <div class="stars">${renderStars(p.avgRating)}</div>
          <span class="star-avg">${p.avgRating.toFixed(1)}</span>
          <span class="star-count">(${p.reviewCount.toLocaleString()})</span>
        </div>
        <div class="my-rate-row" onclick="event.stopPropagation()">
          <span class="my-rate-label">내 평점</span>
          <div class="my-stars" id="myStars_card_${p.id}">
            ${renderMyStars(p.id, myScore, 18, 'card')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ──────────────────────────────────────────
   MODAL
────────────────────────────────────────── */
function openModal(productId){
  openProductId = productId;
  const p = PRODUCTS.find(x=>x.id===productId);
  const myScore = myRatings[productId]||0;

  const reviewsHtml = p.reviews.map(r=>{
    const initials = r.user.slice(0,2);
    return `<div class="review-item">
      <div class="review-header">
        <div class="review-avatar">${initials}</div>
        <span class="review-user">${r.user}</span>
        <div class="review-stars">${renderStars(r.score,12)}</div>
        <span class="review-date">${r.date}</span>
      </div>
      <p class="review-text">${r.text}</p>
    </div>`;
  }).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-hero">
      <img class="modal-img" src="${p.img}" alt="${p.name}">
      <div class="modal-info">
        <div class="modal-cat">${p.cat}</div>
        <div class="modal-name">${p.name}</div>
        <div class="modal-brand">${p.brand}</div>
        <div class="modal-score-block">
          <span class="modal-score-big">${p.avgRating.toFixed(1)}</span>
          <span class="modal-score-denom">/5.0</span>
        </div>
        <div class="modal-stars-lg">${renderStars(p.avgRating,18)}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px">리뷰 ${p.reviewCount.toLocaleString()}개</div>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-desc">${p.desc}</p>
      <div class="modal-tags">${p.tags.map(t=>`<span class="tag"># ${t}</span>`).join('')}</div>

      <div class="modal-rate-section">
        <div class="modal-rate-title">내 평점 남기기</div>
        <div class="modal-rate-stars" id="myStars_modal_${p.id}">
          ${renderMyStars(p.id, myScore, 32, 'modal')}
        </div>
        <div class="rate-hint" id="rateHint">${myScore ? RATING_LABELS[myScore] : ''}</div>
      </div>

      <div class="modal-reviews">
        <div class="review-title">리뷰 ${p.reviews.length}개</div>
        ${reviewsHtml || '<p style="font-size:13px;color:var(--text-dim)">아직 리뷰가 없어요.</p>'}
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  openProductId=null;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

/* ──────────────────────────────────────────
   EVENTS
────────────────────────────────────────── */
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGrid();
});

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderGrid();
  });
});

document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value.trim();
  renderGrid();
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
});

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
renderGrid();
</script>
