<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베베스코어 — 육아용품 평점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f8f9fb;
    --border: #eeeef5;
    --border-hover: #e2e2f0;
    --text: #12121c;
    --text-muted: #5a5a75;
    --text-dim: #b0b0c8;

    /* 더욱 부드럽고 차분해진 프리미엄 오로라 팔레트 */
    --r-gradient: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #a1c4fd, #c2e9fb, #d4fc79, #84fab0);
    --rainbow: linear-gradient(90deg, #ff6b6b, #f06595, #cc5de8, #845ef7, #5c7cfa, #339af0, #22b8cf, #20c997, #51cf66, #fab005, #ff922b);
    --rainbow-soft: rgba(255, 107, 107, 0.05);
    --r-size: 400% 400%;
    
    /* 카테고리별 포인트 컬러 */
    --c-all: linear-gradient(135deg, #ff0080, #7000ff);
    --c-stroller: linear-gradient(135deg, #ff6b6b, #f06595);
    --c-carseat: linear-gradient(135deg, #339af0, #22b8cf);
    --c-feeding: linear-gradient(135deg, #fcc419, #ff922b);
    --c-bedding: linear-gradient(135deg, #4cc9f0, #4895ef);
    --c-bath: linear-gradient(135deg, #845ef7, #5c7cfa);
    --c-toy: linear-gradient(135deg, #ff922b, #fab005);
    --c-clothes: linear-gradient(135deg, #ff8787, #ee61cf);
    
    --radius: 20px;
    --card-w: 220px;
    --shadow: 0 4px 12px rgba(0,0,0,.03);
    --shadow-hover: 0 20px 40px rgba(0,0,0,.08);
  }

  @keyframes auroraFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(circle at 0% 0%, rgba(255,107,107,0.03), transparent 35%),
      radial-gradient(circle at 100% 0%, rgba(51,154,240,0.03), transparent 35%);
  }

  /* ── HEADER ── */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(255,255,255,.8);
    backdrop-filter: blur(25px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex; align-items: center; gap:32px;
    height: 72px;
    transition: all .3s;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    background: var(--r-gradient);
    background-size: var(--r-size);
    animation: auroraFlow 20s ease infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    white-space: nowrap;
    cursor: pointer;
  }

  .search-wrap { flex:1; max-width:420px; position:relative; }
  .search-wrap input {
    width:100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px 10px 46px;
    color: var(--text);
    font-family: inherit; font-size: 14px;
    outline: none;
    transition: all .3s;
  }
  .search-wrap input:focus {
    border-color: #adb5bd;
    background:#fff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.04);
  }
  .search-wrap svg {
    position:absolute; left:18px; top:50%; transform:translateY(-50%);
    color: var(--text-dim);
  }

  .header-nav { margin-left:auto; display:flex; gap:12px; }
  .btn-ghost {
    background:none; border:1.5px solid var(--border);
    color: var(--text-muted); padding:9px 22px;
    border-radius:100px; font-family:inherit; font-size:14px; font-weight:600;
    cursor:pointer; transition: all .2s;
  }
  .btn-ghost:hover { background: var(--surface2); color: #000; }

  .btn-fill {
    background: var(--r-gradient);
    background-size: var(--r-size);
    animation: auroraFlow 15s ease infinite;
    border: none;
    color: #fff; padding:10px 24px;
    border-radius:100px; font-family:inherit; font-size:14px; font-weight:800;
    cursor:pointer; transition: all .3s;
    box-shadow: 0 8px 20px rgba(255,107,107,0.15);
  }
  .btn-fill:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 28px rgba(255,107,107,0.25); }

  /* ── HERO ── */
  .hero {
    padding: 80px 32px 40px;
    position:relative; z-index:1;
    text-align: center;
  }
  .hero-eyebrow {
    font-size:13px; font-weight:800; letter-spacing:3px;
    background: var(--r-gradient);
    background-size: var(--r-size);
    animation: auroraFlow 20s ease infinite;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-transform:uppercase; margin-bottom:16px;
    display:inline-block;
  }
  .hero-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight:900; line-height:1.1; letter-spacing:-2px;
    margin-bottom:20px; color: #000;
  }
  .hero-title em {
    font-style:normal;
    background: var(--r-gradient);
    background-size: var(--r-size);
    animation: auroraFlow 15s ease infinite;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-sub { font-size:17px; color: var(--text-muted); max-width:600px; margin: 0 auto; line-height:1.7; }

  /* ── TABS ── */
  .tabs-wrap {
    padding: 20px 32px 30px;
    display:flex; gap:10px; justify-content: center;
    position:relative; z-index:1;
  }
  .tab {
    background: #fff; border:1.5px solid var(--border);
    color: var(--text-muted); padding:8px 22px;
    border-radius:100px; font-family:inherit; font-size:15px; font-weight:600;
    cursor:pointer; transition: all .3s; white-space:nowrap;
  }
  .tab:hover { border-color: #adb5bd; color: #000; }
  .tab.active {
    border-color: transparent;
    color: #fff; font-weight:800;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }
  .tab.active[data-cat="전체"] { background: var(--c-all); }
  .tab.active[data-cat="유모차"] { background: var(--c-stroller); }
  .tab.active[data-cat="카시트"] { background: var(--c-carseat); }
  .tab.active[data-cat="수유용품"] { background: var(--c-feeding); }
  .tab.active[data-cat="침구류"] { background: var(--c-bedding); }
  .tab.active[data-cat="목욕용품"] { background: var(--c-bath); }
  .tab.active[data-cat="장난감"] { background: var(--c-toy); }
  .tab.active[data-cat="의류"] { background: var(--c-clothes); }
  .tab.active[data-cat="전체"] { background: var(--c-all); }
  .tab.active[data-cat="유모차"] { background: var(--c-stroller); }
  .tab.active[data-cat="카시트"] { background: var(--c-carseat); }
  .tab.active[data-cat="수유용품"] { background: var(--c-feeding); }
  .tab.active[data-cat="침구류"] { background: var(--c-bedding); }
  .tab.active[data-cat="목욕용품"] { background: var(--c-bath); }
  .tab.active[data-cat="장난감"] { background: var(--c-toy); }
  .tab.active[data-cat="의류"] { background: var(--c-clothes); }

  /* ── SORT BAR ── */
  .sort-bar {
    padding: 0 40px 20px;
    display:flex; align-items:center; gap:20px;
    position:relative; z-index:1;
    max-width: 1200px; margin: 0 auto;
  }
  .sort-label { font-size:14px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .sort-btn {
    background:none; border:none; font-family:inherit;
    font-size:15px; color: var(--text-dim); cursor:pointer;
    padding: 4px 0; transition: all .2s;
    position: relative;
    font-weight: 600;
  }
  .sort-btn.active { color: #000; font-weight:800; }
  .sort-btn.active::after {
    content: "";
    position: absolute; bottom: 0; left: 0; width: 100%; height: 2.5px;
    background: var(--r-gradient);
    background-size: var(--r-size);
    animation: auroraFlow 20s ease infinite;
    border-radius: 10px;
  }
  .item-count { margin-left:auto; font-size:15px; font-weight: 700; color: var(--text-muted); }

  /* ── GRID ── */
  .grid {
    padding: 0 32px 100px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
    gap: 32px;
    position:relative; z-index:1;
    max-width: 1200px; margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s, border-color .2s;
    box-shadow: var(--shadow);
    animation: fadeUp .4s both;
    position:relative;
  }
  .card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:3px;
    background: var(--rainbow);
    opacity:0; transition: opacity .25s;
    z-index:2;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-hover);
    border-color: var(--border-hover);
  }
  .card:hover::before { opacity:1; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card:nth-child(1)  { animation-delay:.03s }
  .card:nth-child(2)  { animation-delay:.06s }
  .card:nth-child(3)  { animation-delay:.09s }
  .card:nth-child(4)  { animation-delay:.12s }
  .card:nth-child(5)  { animation-delay:.15s }
  .card:nth-child(6)  { animation-delay:.18s }
  .card:nth-child(7)  { animation-delay:.21s }
  .card:nth-child(8)  { animation-delay:.24s }
  .card:nth-child(9)  { animation-delay:.27s }
  .card:nth-child(10) { animation-delay:.30s }
  .card:nth-child(11) { animation-delay:.33s }
  .card:nth-child(12) { animation-delay:.36s }

  .card-img-wrap { position:relative; overflow:hidden; }
  .card-img-wrap img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; transition: transform .4s; }
  .card:hover .card-img-wrap img { transform:scale(1.06); }

  .card-badge {
    position:absolute; top:10px; left:10px;
    font-size:10px; font-weight:700; letter-spacing:.5px;
    padding: 3px 9px; border-radius:100px; color:#fff;
  }
  .card-badge.best { background: #ff4d6d; box-shadow:0 2px 8px rgba(255,77,109,.38); }
  .card-badge.new  { background: #06d6a0; box-shadow:0 2px 8px rgba(6,214,160,.38); }
  .card-badge.pick { background: #7b5ea7; box-shadow:0 2px 8px rgba(123,94,167,.38); }

  .card-my-rating {
    position:absolute; top:10px; right:10px;
    background: rgba(255,255,255,.93); backdrop-filter:blur(8px);
    border-radius:8px; padding:4px 8px;
    font-size:12px; font-weight:700; color: var(--r2);
    display:flex; align-items:center; gap:2px;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }

  .card-body { padding: 14px 14px 16px; }
  .card-category {
    font-size:10px; font-weight:700; letter-spacing:1.5px;
    color: var(--text-dim); text-transform:uppercase; margin-bottom:5px;
  }
  .card-name { font-size:14px; font-weight:700; line-height:1.35; margin-bottom:3px; color: var(--text); }
  .card-brand { font-size:12px; color: var(--text-muted); margin-bottom:10px; }

  .stars-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .stars { display:flex; gap:2px; }
  .star { width:14px; height:14px; display:inline-block; }
  .star svg { width:14px; height:14px; }
  .star-avg {
    font-size:13px; font-weight:700;
    background: var(--rainbow);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .star-count { font-size:11px; color: var(--text-dim); }

  .my-rate-row {
    display:flex; align-items:center; gap:6px;
    border-top: 1px solid var(--border); padding-top:10px; margin-top:4px;
  }
  .my-rate-label { font-size:11px; color: var(--text-dim); }
  .my-stars { display:flex; gap:2px; }
  .my-star { width:18px; height:18px; cursor:pointer; transition: transform .15s; }
  .my-star:hover { transform: scale(1.3); }
  .my-star svg { width:18px; height:18px; }

  /* ── MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; z-index:200;
    background: rgba(10,10,30,.3); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    opacity:0; pointer-events:none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }

  .modal {
    background: #fff;
    border:1.5px solid var(--border);
    border-radius: 20px;
    width:100%; max-width:540px;
    max-height: 88vh; overflow-y:auto;
    transform: translateY(24px) scale(.97);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    position:relative;
    box-shadow: 0 24px 60px rgba(0,0,0,.13);
  }
  .modal-top-bar {
    height:4px;
    background: var(--rainbow);
    border-radius:20px 20px 0 0;
    position:sticky; top:0; z-index:5;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-close {
    position:absolute; top:16px; right:16px;
    background: var(--surface2); border:none;
    color: var(--text-muted); width:34px; height:34px;
    border-radius:50%; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:10; transition: background .2s, color .2s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-hero { display:flex; gap:20px; padding:20px 24px 0; }
  .modal-img {
    width:120px; height:120px; object-fit:cover;
    border-radius:12px; flex-shrink:0;
    border: 1px solid var(--border);
  }
  .modal-info { flex:1; }
  .modal-cat {
    font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px;
    background: var(--rainbow);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .modal-name { font-size:20px; font-weight:900; line-height:1.2; margin-bottom:4px; color:var(--text); }
  .modal-brand { font-size:13px; color: var(--text-muted); margin-bottom:12px; }

  .modal-score-block { display:flex; align-items:baseline; gap:8px; margin-bottom:8px; }
  .modal-score-big {
    font-size:40px; font-weight:900; line-height:1;
    background: var(--rainbow);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .modal-score-denom { font-size:16px; color: var(--text-dim); }
  .modal-stars-lg { display:flex; gap:3px; }
  .modal-stars-lg svg { width:18px; height:18px; }

  .modal-body { padding: 20px 24px 28px; }
  .modal-desc { font-size:14px; color: var(--text-muted); line-height:1.75; margin-bottom:20px; }

  .modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
  .tag {
    background: var(--surface2); border:1.5px solid var(--border);
    color: var(--text-muted); font-size:12px;
    padding:4px 10px; border-radius:100px; transition: all .2s;
  }
  .tag:hover { border-color: var(--r5); color: var(--r5); }

  .modal-rate-section {
    background: var(--rainbow-soft);
    border: 1.5px solid var(--border);
    border-radius:16px; padding:16px 20px; margin-bottom:24px;
  }
  .modal-rate-title { font-size:13px; font-weight:700; margin-bottom:10px; color:var(--text); }
  .modal-rate-stars { display:flex; gap:6px; }
  .modal-rate-star { width:32px; height:32px; cursor:pointer; transition: transform .15s; }
  .modal-rate-star:hover { transform: scale(1.3); }
  .modal-rate-star svg { width:32px; height:32px; }
  .rate-hint {
    font-size:12px; font-weight:700; margin-top:8px; height:18px;
    background: var(--rainbow);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .review-title { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--text); }
  .review-item {
    background: var(--surface2); border-radius:12px;
    padding: 14px; margin-bottom:10px;
    border:1px solid var(--border);
  }
  .review-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .review-avatar {
    width:28px; height:28px; border-radius:50%;
    background: var(--rainbow);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .review-user { font-size:13px; font-weight:700; color:var(--text); }
  .review-date { font-size:11px; color: var(--text-dim); margin-left:auto; }
  .review-stars { display:flex; gap:2px; margin-bottom:6px; }
  .review-stars svg { width:12px; height:12px; }
  .review-text { font-size:13px; color: var(--text-muted); line-height:1.65; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px);
    background: #fff; border:1.5px solid var(--border);
    border-radius:100px; padding:10px 22px;
    font-size:13px; color: var(--text);
    opacity:0; pointer-events:none; transition: all .3s;
    z-index:999; white-space:nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.1);
    overflow:hidden;
  }
  .toast::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0; height:3px;
    background: var(--rainbow);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast strong {
    background: var(--rainbow);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  @media(max-width:600px){
    header { padding:0 16px; }
    .hero, .tabs-wrap, .sort-bar, .grid { padding-left:16px; padding-right:16px; }
    .hero { padding-top:36px; }
    :root { --card-w: 150px; }
  }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#f7f7fa; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#ff4d6d,#4cc9f0); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="logo">BEBESCORE</div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" placeholder="육아용품 검색..." id="searchInput">
  </div>
  <div class="header-nav">
    <button class="btn-ghost">로그인</button>
    <button class="btn-fill">회원가입</button>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">✦ 육아용품 평점 플랫폼</p>
  <h1 class="hero-title">내 아이에게 딱 맞는<br><em>육아용품</em>을 찾아보세요</h1>
  <p class="hero-sub">실제 부모들의 솔직한 평점과 리뷰로 믿을 수 있는 육아용품을 선택하세요.</p>
</section>

<div class="tabs-wrap" id="tabs">
  <button class="tab active" data-cat="전체">전체</button>
  <button class="tab" data-cat="유모차">🚼 유모차</button>
  <button class="tab" data-cat="카시트">🚗 카시트</button>
  <button class="tab" data-cat="수유용품">🍼 수유용품</button>
  <button class="tab" data-cat="침구류">🛏 침구류</button>
  <button class="tab" data-cat="목욕용품">🛁 목욕용품</button>
  <button class="tab" data-cat="장난감">🧸 장난감</button>
  <button class="tab" data-cat="의류">👶 의류</button>
</div>

<div class="sort-bar">
  <span class="sort-label">정렬</span>
  <button class="sort-btn active" data-sort="rating">평점순</button>
  <button class="sort-btn" data-sort="reviews">리뷰많은순</button>
  <button class="sort-btn" data-sort="newest">최신순</button>

let currentCat = '전체';
let currentSort = 'rating';
let searchQuery = '';
let myRatings = {};
let openProductId = null;

const RATING_LABELS = ['','별로예요','그저 그래요','보통이에요','좋아요!','최고예요!'];

function starSVG(filled){
  const c = filled ? '#ffd166' : '#e0e0f0';
  return `<svg viewBox="0 0 24 24" fill="${c}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
}

function renderStars(avg){
  let h='';
  for(let i=1;i<=5;i++) h+=`<span class="star">${starSVG(i<=Math.round(avg))}</span>`;
  return h;
}

function renderMyStars(productId, currentScore, size, context){
  let h='';
  for(let i=1;i<=5;i++){
    const filled = i<=(myRatings[productId]||0);
    h+=`<span class="my-star"
      data-id="${productId}" data-score="${i}" data-ctx="${context}"
      onmouseenter="hoverStar(this,${i},'${context}_${productId}')"
      onmouseleave="unhoverStar('${context}_${productId}',${myRatings[productId]||0})"
      onclick="rateStar(${productId},${i})">${starSVG(filled)}</span>`;
  }
  return h;
}

function hoverStar(el, score, groupId){
  document.querySelectorAll(`[data-ctx="${el.dataset.ctx}"]`).forEach(s=>{
    s.innerHTML = starSVG(parseInt(s.dataset.score)<=score);
  });
  const hint = document.getElementById('rateHint');
  if(hint) hint.textContent = RATING_LABELS[score];
}

function unhoverStar(groupId, savedScore){
  const [ctx, id] = groupId.split('_');
  document.querySelectorAll(`[data-ctx="${ctx}"][data-id="${id}"]`).forEach(s=>{
    s.innerHTML = starSVG(parseInt(s.dataset.score)<=savedScore);
  });
  const hint = document.getElementById('rateHint');
  if(hint) hint.textContent = savedScore ? RATING_LABELS[savedScore] : '';
}

function rateStar(productId, score){
  myRatings[productId] = score;
  showToast(`<strong>${RATING_LABELS[score]}</strong> — 평점이 저장되었어요 ⭐`);
  renderGrid();
  if(openProductId === productId) openModal(productId);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'),2400);
}

function filteredProducts(){
  let list = PRODUCTS.filter(p=>{
    const matchCat = currentCat==='전체' || p.cat===currentCat;
    const matchSearch = !searchQuery ||
      p.name.includes(searchQuery) || p.brand.includes(searchQuery) || p.cat.includes(searchQuery);
    return matchCat && matchSearch;
  });
  if(currentSort==='rating')  list.sort((a,b)=>b.avgRating-a.avgRating);
  if(currentSort==='reviews') list.sort((a,b)=>b.reviewCount-a.reviewCount);
  if(currentSort==='newest')  list.sort((a,b)=>b.id-a.id);
  return list;
}

function renderGrid(){
  const list = filteredProducts();
  document.getElementById('itemCount').textContent = `총 ${list.length}개`;
  document.getElementById('grid').innerHTML = list.map((p,i)=>{
    const myScore = myRatings[p.id]||0;
    const badgeHtml = p.badge
      ? `<span class="card-badge ${p.badge}">${p.badge==='best'?'BEST':p.badge==='new'?'NEW':'PICK'}</span>` : '';
    const myBadge = myScore ? `<span class="card-my-rating">⭐ ${myScore}</span>` : '';
    return `
    <div class="card" style="animation-delay:${i*0.04}s" onclick="openModal(${p.id})">
      <div class="card-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        ${badgeHtml}${myBadge}
      </div>
      <div class="card-body">
        <div class="card-category">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-brand">${p.brand}</div>
        <div class="stars-row">
          <div class="stars">${renderStars(p.avgRating)}</div>
          <span class="star-avg">${p.avgRating.toFixed(1)}</span>
          <span class="star-count">(${p.reviewCount.toLocaleString()})</span>
        </div>
        <div class="my-rate-row" onclick="event.stopPropagation()">
          <span class="my-rate-label">내 평점</span>
          <div class="my-stars">${renderMyStars(p.id, myScore, 18, 'card')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(productId){
  openProductId = productId;
  const p = PRODUCTS.find(x=>x.id===productId);
  const myScore = myRatings[productId]||0;
  const reviewsHtml = p.reviews.map(r=>`
    <div class="review-item">
      <div class="review-header">
        <div class="review-avatar">${r.user.slice(0,2)}</div>
        <span class="review-user">${r.user}</span>
        <div class="review-stars">${renderStars(r.score)}</div>
        <span class="review-date">${r.date}</span>
      </div>
      <p class="review-text">${r.text}</p>
    </div>`).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-hero">
      <img class="modal-img" src="${p.img}" alt="${p.name}">
      <div class="modal-info">
        <div class="modal-cat">${p.cat}</div>
        <div class="modal-name">${p.name}</div>
        <div class="modal-brand">${p.brand}</div>
        <div class="modal-score-block">
          <span class="modal-score-big">${p.avgRating.toFixed(1)}</span>
          <span class="modal-score-denom">/5.0</span>
        </div>
        <div class="modal-stars-lg">${renderStars(p.avgRating)}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px">리뷰 ${p.reviewCount.toLocaleString()}개</div>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-desc">${p.desc}</p>
      <div class="modal-tags">${p.tags.map(t=>`<span class="tag"># ${t}</span>`).join('')}</div>
      <div class="modal-rate-section">
        <div class="modal-rate-title">✨ 내 평점 남기기</div>
        <div class="modal-rate-stars">${renderMyStars(p.id, myScore, 32, 'modal')}</div>
        <div class="rate-hint" id="rateHint">${myScore ? RATING_LABELS[myScore] : ''}</div>
      </div>
      <div class="modal-reviews">
        <div class="review-title">리뷰 ${p.reviews.length}개</div>
        ${reviewsHtml || '<p style="font-size:13px;color:var(--text-dim)">아직 리뷰가 없어요.</p>'}
      </div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  openProductId=null;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGrid();
});
document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderGrid();
  });
});
document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value.trim();
  renderGrid();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

renderGrid();
</script>
</body>
</html>
